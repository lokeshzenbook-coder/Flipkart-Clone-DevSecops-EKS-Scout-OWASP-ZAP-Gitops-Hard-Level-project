name: Flipkart DevSecOps Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: flipkartimg
  AWS_ACCOUNT_ID: 970378220457
  IMAGE_NAME: flipkart
  DOCKERHUB_IMAGE: harishnshetty/flipkart

jobs:

  build-test-security:
    name: Build Test Security Scan
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------
      # CHECKOUT
      # ---------------------------------------------------

      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # NODE.JS SETUP
      # ---------------------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------------------------------------------
      # JAVA SETUP
      # ---------------------------------------------------

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------------------------------
      # INSTALL DEPENDENCIES
      # ---------------------------------------------------

      - name: Install Dependencies
        run: npm install

      # ---------------------------------------------------
      # SONARQUBE SCAN
      # ---------------------------------------------------

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          npm install -g sonarqube-scanner

          sonar-scanner \
            -Dsonar.projectName=flipkart \
            -Dsonar.projectKey=flipkart \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.login=${SONAR_TOKEN}

      # ---------------------------------------------------
      # OWASP DEPENDENCY CHECK
      # ---------------------------------------------------

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "flipkart"
          path: "."
          format: "HTML"
          out: "reports"

      - name: Upload Dependency Check Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

      # ---------------------------------------------------
      # TRIVY FILE SYSTEM SCAN
      # ---------------------------------------------------

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # ---------------------------------------------------
      # DOCKER LOGIN
      # ---------------------------------------------------

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------------------------------------------
      # DOCKER SCOUT FILE SYSTEM SCAN
      # ---------------------------------------------------

      - name: Docker Scout Quickview
        run: |
          docker scout quickview fs://. > quickview-report.txt

      - name: Docker Scout CVE Scan
        run: |
          docker scout cves fs://. > cves-report.txt

      - name: Upload Docker Scout FS Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-scout-fs-reports
          path: |
            quickview-report.txt
            cves-report.txt

      # ---------------------------------------------------
      # BUILD IMAGE
      # ---------------------------------------------------

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      # ---------------------------------------------------
      # TRIVY IMAGE SCAN
      # ---------------------------------------------------

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # ---------------------------------------------------
      # DOCKER SCOUT IMAGE SCAN
      # ---------------------------------------------------

      - name: Docker Scout Image Scan
        run: |
          docker scout cves $IMAGE_NAME > image-cves-report.txt
          docker scout recommendations $IMAGE_NAME > image-recommendations.txt

      - name: Upload Docker Scout Image Reports
        uses: actions/upload-artifact@v4
        with:
          name: docker-scout-image-reports
          path: |
            image-cves-report.txt
            image-recommendations.txt

      # ---------------------------------------------------
      # AWS OIDC AUTHENTICATION
      # ---------------------------------------------------

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::970378220457:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------------------------------
      # LOGIN TO ECR
      # ---------------------------------------------------

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------
      # SET IMAGE TAG
      # ---------------------------------------------------

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------------------------------------------------
      # TAG IMAGE
      # ---------------------------------------------------

      - name: Tag Docker Images
        run: |
          docker tag $IMAGE_NAME:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

          docker tag $IMAGE_NAME:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

          docker tag $IMAGE_NAME:latest \
          $DOCKERHUB_IMAGE:$IMAGE_TAG

          docker tag $IMAGE_NAME:latest \
          $DOCKERHUB_IMAGE:latest

      # ---------------------------------------------------
      # PUSH TO AWS ECR
      # ---------------------------------------------------

      - name: Push Docker Images to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      # ---------------------------------------------------
      # PUSH TO DOCKER HUB
      # ---------------------------------------------------

      - name: Push Docker Images to DockerHub
        run: |
          docker push $DOCKERHUB_IMAGE:$IMAGE_TAG
          docker push $DOCKERHUB_IMAGE:latest

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build-test-security

    steps:

      - name: Deploy Container
        run: |
          docker rm -f flipkart || true

          docker run -d \
            --name flipkart \
            -p 80:80 \
            harishnshetty/flipkart:latest

  dast-scan:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: deploy

    steps:

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk/:rw \
            zaproxy/zap-stable \
            zap-baseline.py \
            -t http://localhost \
            -r zap_report.html \
            -J zap_report.json

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            zap_report.html
            zap_report.json

  notifications:
    name: Slack Notifications
    runs-on: ubuntu-latest
    needs:
      - build-test-security
      - deploy
      - dast-scan

    if: always()

    steps:

      - name: Slack Notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ Flipkart DevSecOps Pipeline Finished

              Repository: ${{ github.repository }}

              Workflow: ${{ github.workflow }}

              Run Number: ${{ github.run_number }}

              Status: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
